<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SubscriptionHub</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="bg"></div>

<div class="container">

<header>

<div>

<h1>SubscriptionHub</h1>

<p>Manage all your subscriptions in one beautiful dashboard.</p>

</div>

<button id="themeBtn">

<i class="fa-solid fa-moon"></i>

</button>

</header>

<section class="stats">

<div class="card">

<div class="icon">

<i class="fa-solid fa-wallet"></i>

</div>

<div>

<h4>Monthly</h4>

<h2 id="monthly">$0</h2>

</div>

</div>

<div class="card">

<div class="icon">

<i class="fa-solid fa-calendar-days"></i>

</div>

<div>

<h4>Yearly</h4>

<h2 id="yearly">$0</h2>

</div>

</div>

<div class="card">

<div class="icon">

<i class="fa-solid fa-layer-group"></i>

</div>

<div>

<h4>Subscriptions</h4>

<h2 id="count">0</h2>

</div>

</div>

</section>

<section class="addBox">

<h2>Add Subscription</h2>

<div class="grid">

<input
id="name"
placeholder="Netflix">

<input
id="price"
type="number"
placeholder="Monthly Price">

<select id="category">

<option>Streaming</option>

<option>Music</option>

<option>Gaming</option>

<option>AI</option>

<option>Education</option>

<option>Cloud</option>

<option>Productivity</option>

<option>Other</option>

</select>

<input
id="renewal"
type="date">

</div>

<button id="addBtn">

<i class="fa-solid fa-plus"></i>

Add Subscription

</button>

</section>

<section class="searchBox">

<div class="search">

<i class="fa-solid fa-magnifying-glass"></i>

<input
id="search"
placeholder="Search subscriptions...">

</div>

</section>

<section>

<div
id="cards"
class="cards">

</div>

</section>

<footer>

----------

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
